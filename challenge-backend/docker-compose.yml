services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tenpo
      POSTGRES_USER: tenpo
      POSTGRES_PASSWORD: password-tenpo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tenpo
      SPRING_DATASOURCE_USERNAME: tenpo
      SPRING_DATASOURCE_PASSWORD: password-tenpo
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
