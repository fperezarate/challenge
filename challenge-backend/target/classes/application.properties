spring.application.name=transaction-api

spring.datasource.url=jdbc:postgresql://localhost:5432/challenge-tenpo
spring.datasource.username=${DB_USERNAME:feliperez}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8081

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS: orígenes permitidos para el frontend (separados por coma)
app.cors.allowed-origins=http://localhost:3000

# Logging: ver logback-spring.xml (formato con UUID en cada línea, nivel DEBUG para com.challenge.transaction)
